<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花小舖 Sakura Shop | Discord 登入系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #6c5ce7;
            --hover-purple: #5b4bc4;
            --main-pink: #ff5f96;
            --bg-light: #f9f9fb;
            --text-dark: #2d3436;
            --discord: #5865F2;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans TC',sans-serif; }
        body { background: var(--bg-light); color: var(--text-dark); }

        /* 頂部快速選單 - 整合登入狀態 */
        .utility-nav {
            background: #fff; padding: 10px 10%; display: flex; justify-content: space-between;
            font-size: 13px; color: #636e72; border-bottom: 1px solid #eee;
        }
        .user-zone { display: flex; gap: 15px; align-items: center; }
        .login-btn { background: var(--discord); color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .admin-btn { background: #2d3436; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        .header-main { background: #fff; padding: 20px 10%; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 30px; font-weight: 900; }
        .logo span { color: var(--main-pink); }

        .nav-bar { background: var(--primary-purple); padding: 0 10%; display: flex; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px 25px; color: white; font-weight: 500; cursor: pointer; }
        .nav-item:hover { background: var(--hover-purple); }

        .main-container { width: 85%; max-width: 1200px; margin: 30px auto; display: flex; gap: 30px; }
        
        /* 商品卡片優化 */
        .products-wrap { flex-grow: 1; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 20px; }
        .p-card { background: white; border-radius: 10px; border: 1px solid #eee; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .img-box { width: 100%; aspect-ratio: 1/1; padding: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .p-info { padding: 15px; text-align: center; }
        .p-price { font-size: 18px; color: #ff4d4f; font-weight: 700; }

        /* 後台管理面板 (隱藏) */
        #adminPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 3000; display: none; padding: 40px 10%;
            overflow-y: auto;
        }
        .order-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .order-table th, .order-table td { border: 1px solid #eee; padding: 15px; text-align: left; }
        .order-table th { background: #f8f9fa; }

        /* 彈窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: white; width: 450px; border-radius: 12px; padding: 30px; text-align: center; }
        .btn-confirm { background: var(--primary-purple); color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: 700; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

<div class="utility-nav">
    <div style="color: var(--main-pink); font-weight: 700;">🕒 營業時間：平日 08:00-21:00 / 工作日 17:00-21:00</div>
    <div class="user-zone" id="userZone">
        <span onclick="toggleAdmin()" class="admin-btn">管理後台</span>
        <span onclick="simulateLogin()" class="login-btn">Discord 登入註冊</span>
    </div>
</div>

<header class="header-main">
    <div class="logo">🌸 櫻花<span>小舖</span></div>
    <div style="font-size: 14px; color: #888;">📩 sakurashop.tw@gmail.com</div>
</header>

<nav class="nav-bar">
    <div class="nav-item">遊戲代購</div>
    <div class="nav-item">遊戲代儲</div>
    <div class="nav-item">影音帳號</div>
</nav>

<div class="main-container">
    <main class="products-wrap">
        <h2 style="margin-bottom: 20px;">本店精選商品</h2>
        <div class="product-grid" id="productGrid"></div>
    </main>
</div>

<div id="adminPanel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>櫻花小舖 - 賣家管理後台</h2>
        <button onclick="toggleAdmin()" style="padding: 10px 20px; cursor: pointer;">返回商店</button>
    </div>
    <table class="order-table">
        <thead>
            <tr>
                <th>訂單時間</th>
                <th>買家 Discord</th>
                <th>訂單編號</th>
                <th>商品名稱</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="adminOrderList">
            </tbody>
    </table>
</div>

<div class="modal-overlay" id="buyModal">
    <div class="modal">
        <h3 id="m-name">商品名稱</h3>
        <p id="m-price" style="color: #ff4d4f; font-size: 24px; margin: 15px 0;">NT$ 0</p>
        <p style="font-size: 14px; color: #666;">點擊確認後將自動同步至賣家後台</p>
        <button class="btn-confirm" onclick="processOrder()">確認下單並生成編號</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">取消</button>
    </div>
</div>

<footer>
    © 2026 櫻花小舖 Sakura Shop | 串接 Discord OAuth2 授權
</footer>

<script>
    const products = [
        { name: "Minecraft 官方代購", price: "NT$ 800", img: "https://files.catbox.moe/5k4f7c.jpg" },
        { name: "Discord Nitro 贈禮連結", price: "NT$ 150", img: "https://files.catbox.moe/o6o2h1.jpg" },
        { name: "Steam 1000 點數儲值卡", price: "NT$ 1040", img: "https://files.catbox.moe/u0f5v7.jpg" },
        { name: "VALORANT 特戰英豪 VP", price: "NT$ 280", img: "https://files.catbox.moe/7v1v2n.jpg" }
    ];

    let currentUser = null;
    let orders = []; // 模擬後台資料庫

    function renderProducts() {
        document.getElementById('productGrid').innerHTML = products.map((p, idx) => `
            <div class="p-card" onclick="openBuyModal(${idx})">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="p-info">
                    <div style="font-weight:600; font-size:14px; margin-bottom:10px;">${p.name}</div>
                    <div class="p-price">${p.price}</div>
                </div>
            </div>
        `).join('');
    }

    // 模擬 Discord 登入
    function simulateLogin() {
        currentUser = "SakuraUser#" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('userZone').innerHTML = `
            <span onclick="toggleAdmin()" class="admin-btn">管理後台</span>
            <span style="font-weight:700; color:var(--primary-purple);">👤 ${currentUser}</span>
        `;
        alert("已透過 Discord 成功登入！");
    }

    function openBuyModal(idx) {
        if (!currentUser) {
            alert("請先點擊上方 Discord 登入註冊！");
            return;
        }
        const p = products[idx];
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-price').innerText = p.price;
        document.getElementById('buyModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('buyModal').style.display = 'none'; }

    // 核心功能：下單並傳送到後台
    function processOrder() {
        const orderID = "#SAKURA-" + Math.floor(10000 + Math.random() * 90000);
        const orderData = {
            time: new Date().toLocaleString(),
            user: currentUser,
            id: orderID,
            product: document.getElementById('m-name').innerText,
            status: "等待處理"
        };

        // 存入後台資料列表
        orders.unshift(orderData);
        updateAdminTable();

        // 複製給買家
        navigator.clipboard.writeText(`我的訂單編號是：${orderID}\n商品：${orderData.product}`);
        
        alert(`下單成功！\n您的編號：${orderID}\n賣家後台已同步資訊。請至 Discord 貼上編號。`);
        closeModal();
        window.open("https://discord.gg/Yy4RpG4s4n", "_blank");
    }

    // 更新管理員表格
    function updateAdminTable() {
        const list = document.getElementById('adminOrderList');
        list.innerHTML = orders.map(o => `
            <tr>
                <td>${o.time}</td>
                <td style="color:var(--discord); font-weight:700;">${o.user}</td>
                <td style="font-weight:900;">${o.id}</td>
                <td>${o.product}</td>
                <td><span style="color:orange;">● ${o.status}</span></td>
            </tr>
        `).join('');
    }

    function toggleAdmin() {
        const panel = document.getElementById('adminPanel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    renderProducts();
</script>
</body>
</html>
