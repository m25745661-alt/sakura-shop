<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花小舖 Sakura Shop | 雲端訂單系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --pink: #ff5f96; --bg: #f9f9fb; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans TC',sans-serif; }
        body { background: var(--bg); color: #2d3436; }

        /* 頂部資訊區 (不跳轉) */
        .top-info {
            background: #fff; padding: 10px 10%; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .business-tag { color: var(--pink); font-weight: 700; }

        .header { background: #fff; padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 900; color: #333; }
        .logo span { color: var(--pink); }

        .nav { background: var(--primary); padding: 0 10%; display: flex; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 15px 25px; color: white; font-weight: 500; cursor: pointer; }

        .container { width: 85%; max-width: 1200px; margin: 30px auto; }
        
        /* 商品網格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .img-box { width: 100%; aspect-ratio: 1/1; padding: 10px; background: #fafafa; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .info { padding: 15px; text-align: center; }
        .price { color: #ff4d4f; font-weight: 700; font-size: 18px; margin-top: 5px; }

        /* 彈窗系統 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal {
            background: white; width: 90%; max-width: 800px; border-radius: 15px;
            padding: 35px; display: flex; gap: 30px; position: relative;
        }
        .close { position: absolute; right: 20px; top: 20px; font-size: 25px; cursor: pointer; color: #999; }
        
        /* 訂單成功樣式 */
        .order-success {
            display: none; background: #f6ffed; border: 1px solid #b7eb8f;
            padding: 20px; border-radius: 8px; margin-top: 15px; text-align: center;
        }
        .id-display { font-size: 22px; color: #52c41a; font-weight: 900; margin: 10px 0; letter-spacing: 1px; }

        .btn { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 15px; }
        .btn-dc { background: #5865F2; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

<div class="top-info">
    <div>📧 官方信箱：sakurashop.tw@gmail.com | 💬 Discord 客服已連線</div>
    <div class="business-tag">🕒 平日：08:00-21:00 / 工作日：17:00-21:00</div>
</div>

<header class="header">
    <div class="logo">🌸 櫻花<span>小舖</span></div>
</header>

<nav class="nav">
    <div class="nav-item">熱門代購</div>
    <div class="nav-item">遊戲儲值</div>
</nav>

<div class="container">
    <div class="grid" id="productGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <div style="flex: 1;"><img id="m-img" src="" style="width: 100%; border-radius: 10px;"></div>
        <div style="flex: 1.2;">
            <h2 id="m-title">商品名稱</h2>
            <div id="m-price" class="price" style="font-size: 28px; margin: 15px 0;">NT$ 0</div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 13px; color: #888;">選擇版本/方案：</label>
                <select id="m-plan" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px;">
                    <option>官方正版帳號 (首抽/全新)</option>
                    <option>快速序號發送</option>
                    <option>人工代儲服務</option>
                </select>
            </div>

            <button class="btn" id="buyBtn" onclick="submitOrder()">確認下單並生成編號</button>

            <div class="order-success" id="orderResult">
                <p style="font-size: 14px;">🎉 下單成功！請複製編號核對</p>
                <div class="id-display" id="finalID">#SAKURA-XXXXX</div>
                <p style="font-size: 12px; color: #666;">賣家已同步收到此編號資訊</p>
                <button class="btn btn-dc" onclick="goToDiscord()">前往 Discord 貼上編號</button>
            </div>
        </div>
    </div>
</div>

<footer>
    © 2026 櫻花小舖 Sakura Shop | 專注數位產品安全代購
</footer>

<script>
    const products = [
        { name: "Minecraft 官方代購", price: "NT$ 800", img: "https://files.catbox.moe/5k4f7c.jpg" },
        { name: "Discord Nitro 贈禮連結", price: "NT$ 150", img: "https://files.catbox.moe/o6o2h1.jpg" },
        { name: "Steam 1000 點數儲值卡", price: "NT$ 1040", img: "https://files.catbox.moe/u0f5v7.jpg" },
        { name: "VALORANT 特戰英豪 VP", price: "NT$ 280", img: "https://files.catbox.moe/7v1v2n.jpg" }
    ];

    function render() {
        document.getElementById('productGrid').innerHTML = products.map((p, idx) => `
            <div class="card" onclick="openModal(${idx})">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="info">
                    <div style="font-weight:600; height:40px;">${p.name}</div>
                    <div class="price">${p.price}</div>
                </div>
            </div>
        `).join('');
    }

    function openModal(idx) {
        const p = products[idx];
        document.getElementById('m-title').innerText = p.name;
        document.getElementById('m-price').innerText = p.price;
        document.getElementById('m-img').src = p.img;
        document.getElementById('orderResult').style.display = 'none';
        document.getElementById('buyBtn').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    // --- 下單與同步邏輯 ---
    function submitOrder() {
        const rand = Math.floor(10000 + Math.random() * 90000);
        const orderID = "#SAKURA-" + rand;
        const productName = document.getElementById('m-title').innerText;
        const plan = document.getElementById('m-plan').value;

        // 1. 自動複製到剪貼簿 (讓買家可以直接貼給 Discord)
        const info = `【櫻花小舖訂單】\n單號：${orderID}\n商品：${productName}\n規格：${plan}\n價格：${document.getElementById('m-price').innerText}`;
        navigator.clipboard.writeText(info);

        // 2. 顯示結果
        document.getElementById('finalID').innerText = orderID;
        document.getElementById('buyBtn').style.display = 'none';
        document.getElementById('orderResult').style.display = 'block';

        // 3. 賣家後台同步 (提示)
        console.log("賣家核對資訊已儲存:", { orderID, productName, plan, time: new Date() });
        // 如果你有 Google Sheets API，可以在這裡發送 fetch 請求
        
        alert("編號 " + orderID + " 已複製！請至 Discord 貼上完成交易。");
    }

    function goToDiscord() {
        window.open("https://discord.gg/Yy4RpG4s4n", "_blank");
    }

    render();
</script>
</body>
</html>
