<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>櫻花小舖 | 會員與訂單系統</title>
    <style>
        /* 繼承您截圖中的紫色導覽列與白色卡片排版 */
        :root { --main-purple: #6c5ce7; --accent-pink: #ff5f96; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; }
        
        .header { background: #fff; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .nav-bar { background: var(--main-purple); padding: 10px 10%; display: flex; gap: 20px; color: white; }
        
        .container { padding: 30px 10%; }
        .user-panel { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--accent-pink); }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--main-purple); }
        .card img { width: 100%; border-radius: 8px; }
        .price { color: var(--accent-pink); font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        
        /* 隱藏的賣家後台 */
        #adminView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; display: none; padding: 50px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:var(--main-purple)">🌸 櫻花小舖</h2>
    <div id="authZone">
        <button onclick="loginWithDiscord()" style="background:#5865F2; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Discord 授權登入</button>
    </div>
</div>

<div class="nav-bar">
    <span>熱門代購</span><span>遊戲儲值</span><span>影音工具</span>
    <span onclick="enterAdmin()" style="margin-left:auto; cursor:pointer; font-size:12px; opacity:0.7;">賣家登入</span>
</div>

<div class="container">
    <div id="personalCenter" style="display:none;" class="user-panel">
        <h3>👤 歡迎回來，<span id="displayName"></span></h3>
        <p style="font-size:14px; color:#666;">以下是您的訂單紀錄，提供給 Discord 客服核對使用：</p>
        <div id="orderHistory" style="margin-top:10px;">載入中...</div>
    </div>

    <div class="product-grid" id="products"></div>
</div>

<div id="adminView">
    <div style="display:flex; justify-content:space-between">
        <h2>賣家訂單管理後台</h2>
        <button onclick="document.getElementById('adminView').style.display='none'">退出</button>
    </div>
    <table id="adminTable">
        <thead><tr><th>時間</th><th>Discord 買家</th><th>商品</th><th>訂單編號</th></tr></thead>
        <tbody id="adminList"></tbody>
    </table>
</div>

<script>
    const API_URL = "https://你的worker網址.workers.dev";
    let currentUser = localStorage.getItem('sakura_user');

    // 初始化介面
    function init() {
        if(currentUser) {
            document.getElementById('personalCenter').style.display = 'block';
            document.getElementById('displayName').innerText = currentUser;
            fetchHistory();
        }
        renderProducts();
    }

    // 模擬 Discord 登入 (正式環境應串接 OAuth2)
    function loginWithDiscord() {
        const name = prompt("請輸入您的 Discord 暱稱 (例如 User#1234)：");
        if(name) {
            localStorage.setItem('sakura_user', name);
            location.reload();
        }
    }

    // 下單並存入雲端
    async function createOrder(pName, pPrice) {
        if(!currentUser) return alert("請先登入 Discord 以記錄訂單！");
        
        const orderNo = "#SAKURA-" + Math.floor(10000 + Math.random() * 90000);
        const data = {
            user: currentUser,
            product: pName,
            price: pPrice,
            orderNo: orderNo,
            time: new Date().toLocaleString()
        };

        await fetch(`${API_URL}/api/order`, {
            method: 'POST',
            body: JSON.stringify(data)
        });

        alert("訂單已生成！請至個人帳戶查看編號，並前往 Discord 聯繫客服。");
        fetchHistory();
    }

    // 獲取買家歷史紀錄
    async function fetchHistory() {
        const res = await fetch(`${API_URL}/api/my-history?user=${currentUser}`);
        const data = await res.json();
        const html = data.map(o => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
                <span><b>${o.orderNo}</b> - ${o.product}</span>
                <span style="color:#999; font-size:12px;">${o.time}</span>
            </div>
        `).join('');
        document.getElementById('orderHistory').innerHTML = html || "尚無訂單紀錄";
    }

    // 進入賣家後台
    async function enterAdmin() {
        const pwd = prompt("請輸入賣家管理密碼：");
        const res = await fetch(`${API_URL}/api/admin/all-orders?pwd=${pwd}`);
        if(res.ok) {
            const data = await res.json();
            document.getElementById('adminView').style.display = 'block';
            document.getElementById('adminList').innerHTML = data.map(o => `
                <tr><td>${o.time}</td><td>${o.user}</td><td>${o.product}</td><td><b>${o.orderNo}</b></td></tr>
            `).join('');
        } else {
            alert("密碼錯誤，拒絕訪問。");
        }
    }

    function renderProducts() {
        const items = [
            { name: "Minecraft 官方帳號", price: "NT$ 800", img: "https://files.catbox.moe/5k4f7c.jpg" },
            { name: "VALORANT 代儲 1000VP", price: "NT$ 280", img: "https://files.catbox.moe/7v1v2n.jpg" }
        ];
        document.getElementById('products').innerHTML = items.map(i => `
            <div class="card" onclick="createOrder('${i.name}', '${i.price}')">
                <img src="${i.img}">
                <h4>${i.name}</h4>
                <div class="price">${i.price}</div>
                <button style="width:100%; padding:8px; background:var(--main-purple); color:white; border:none; border-radius:5px; cursor:pointer;">立即購買</button>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
