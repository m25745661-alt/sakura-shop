<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花小舖 Sakura Shop | 數位代購旗艦</title>
    <style>
        :root { --main: #6c5ce7; --accent: #ff5f96; --bg: #f4f4f4; --dark: #2d3436; }
        * { box-sizing: border-box; font-family: '微軟正黑體', sans-serif; }
        body { background: var(--bg); margin: 0; }

        /* 導航 */
        .top-bar { background: #333; color: white; padding: 5px 10%; font-size: 12px; display: flex; justify-content: space-between; }
        .header { background: white; padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; }
        .nav-menu { background: var(--main); padding: 10px 10%; color: white; display: flex; gap: 20px; }
        
        /* 輪播區 */
        .banner { background: var(--dark); height: 300px; margin: 20px 10%; display: flex; align-items: center; justify-content: center; color: white; border-radius: 10px; font-size: 24px; }
        
        /* 商品網格 */
        .container { padding: 0 10% 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price { color: var(--accent); font-weight: bold; font-size: 18px; margin: 10px 0; }
        button { background: var(--main); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        
        /* 頁尾 */
        footer { background: #e0e0e0; padding: 30px 10%; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-bar"><span>官方信箱: support@sakurashop.tw</span><span>服務時間: 17:00-21:00</span></div>

<header class="header">
    <div style="font-size: 28px; font-weight: bold; color: var(--main);">🌸 櫻花小舖</div>
    <div onclick="adminLogin()" style="cursor:pointer">管理員後台</div>
</header>

<div class="nav-menu">
    <span>熱門代購</span><span>遊戲儲值</span><span>影音工具</span><span>禮物卡</span>
</div>

<div class="banner">【專業輪播活動區】</div>

<div class="container">
    <h2 style="margin-bottom: 20px;">全店商品</h2>
    <div class="grid" id="productGrid"></div>
</div>

<footer>
    <p>行號：櫻花小舖工作室 | 統一編號：95017564</p>
    <p>© 2026 Sakura Shop | 專注數位產品安全代購</p>
</footer>

<script>
    const products = [
        { name: "Minecraft 官方代購", price: "NT$ 800" },
        { name: "Discord Nitro 贈禮", price: "NT$ 150" },
        { name: "Steam 1000 點數", price: "NT$ 1040" },
        { name: "VALORANT 代儲", price: "NT$ 280" },
        { name: "YouTube Premium", price: "NT$ 90" },
        { name: "Spotify 個人方案", price: "NT$ 120" },
        { name: "崩壞：星穹鐵道代儲", price: "NT$ 300" },
        { name: "絕區零 UID 代儲", price: "NT$ 250" }
    ];

    function render() {
        document.getElementById('productGrid').innerHTML = products.map((p, idx) => `
            <div class="card">
                <div style="height:120px; background:#f9f9f9; margin-bottom:10px;">商品預覽圖</div>
                <div>${p.name}</div>
                <div class="price">${p.price}</div>
                <button onclick="buy('${p.name}')">立即購買</button>
            </div>
        `).join('');
    }

    function buy(name) {
        const orderId = "SK-" + Math.floor(100000 + Math.random() * 899999);
        // 儲存至本地瀏覽器
        let orders = JSON.parse(localStorage.getItem('myOrders') || '[]');
        orders.push({ id: orderId, product: name, time: new Date().toLocaleString() });
        localStorage.setItem('myOrders', JSON.stringify(orders));
        
        alert("下單成功！您的專屬編碼為："+orderId+"\n已自動複製，請提供給客服對帳。");
        navigator.clipboard.writeText(orderId);
    }

    function adminLogin() {
        const pass = prompt("請輸入管理員密碼");
        if(pass === "1234") {
            const orders = JSON.parse(localStorage.getItem('myOrders') || '[]');
            let report = "後台訂單列表：\n";
            orders.forEach(o => report += `${o.id} | ${o.product} | ${o.time}\n`);
            alert(report);
        } else {
            alert("密碼錯誤");
        }
    }

    render();
</script>
</body>
</html>
