<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>櫻花小舖 | 專業數位旗艦商城</title>
    <style>
        :root { --main: #6c5ce7; --accent: #ff5f96; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* 導覽列 */
        .navbar { background: rgba(15, 23, 42, 0.9); padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        
        /* Banner 區 */
        .hero { height: 300px; background: linear-gradient(135deg, #4f46e5, #7c3aed); margin: 20px 10%; border-radius: 20px; display: flex; align-items: center; padding: 0 50px; }
        
        /* 商品網格 */
        .section { padding: 50px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2); }
        
        .price { color: var(--accent); font-size: 20px; font-weight: bold; margin: 10px 0; }
        button { background: var(--main); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--accent); }
        
        .tag { background: var(--accent); font-size: 12px; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 24px; font-weight: bold;">🌸 櫻花小舖</div>
    <div>熱門代購 | 遊戲儲值 | 影音會員 | 其它</div>
</nav>

<div class="hero">
    <div>
        <h1 style="font-size: 40px;">2026 全球數位代購新標竿</h1>
        <p>全自動單號生成，24小時客服，保證不鎖號。</p>
    </div>
</div>

<div class="section">
    <h2>🔥 今日熱門推薦</h2>
    <div class="grid" id="productGrid"></div>
</div>

<script>
    const products = [
        { name: "HamiTV 影視會員", price: "NT$ 180", tag: "熱賣" },
        { name: "Discord Nitro 贈禮", price: "NT$ 150", tag: "優惠" },
        { name: "Minecraft 正版帳號", price: "NT$ 800", tag: "保固" },
        { name: "Valorant VP 代儲", price: "NT$ 280", tag: "秒到" },
        { name: "YouTube Premium", price: "NT$ 90", tag: "極速" },
        { name: "Steam 點數卡 1000", price: "NT$ 1050", tag: "熱門" },
        { name: "Netflix 4K高級", price: "NT$ 120", tag: "現貨" },
        { name: "崩鐵/原神儲值", price: "NT$ 3000", tag: "專業" }
    ];

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <span class="tag">${p.tag}</span>
                <h3 style="margin-top:15px;">${p.name}</h3>
                <div class="price">${p.price}</div>
                <button onclick="buy('${p.name}')">立即購買</button>
            </div>
        `).join('');
    }

    function buy(name) {
        const orderId = "SK-" + Math.floor(Math.random() * 900000);
        navigator.clipboard.writeText(orderId);
        alert(`下單成功！您的訂單編號: ${orderId}\n已複製，請前往 Discord 客服確認。`);
    }

    render();
</script>
</body>
</html>
