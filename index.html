<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花小舖 Sakura Shop | 專業數位商品代購</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-purple: #6c5ce7;
            --main-green: #52c41a;
            --info-blue: #e6f7ff;
            --info-border: #91d5ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans TC',sans-serif; }
        body { background: white; color: #333; }
        a { text-decoration: none; color: inherit; }

        /* 導航列樣式 (延續之前的專業版) */
        .top-nav { display: flex; justify-content: flex-end; padding: 10px 10%; gap: 25px; font-size: 13px; color: #777; border-bottom: 1px solid #f0f0f0; }
        .header-main { display: flex; align-items: center; justify-content: space-between; padding: 15px 10%; }
        .logo { font-size: 28px; font-weight: 900; }
        .category-bar { background: var(--main-purple); padding: 0 10%; display: flex; }
        .nav-item { padding: 15px 25px; color: white; font-weight: 500; cursor: pointer; }

        /* 商品網格 */
        .container { width: 85%; max-width: 1200px; margin: 30px auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .p-card { border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .img-wrap { width: 100%; aspect-ratio: 1/1; padding: 12px; background: #f9f0ff; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .p-info { padding: 15px; text-align: center; }
        .p-name { font-size: 15px; font-weight: 500; height: 44px; margin-bottom: 8px; }
        .p-price { color: #ff4d4f; font-weight: 700; font-size: 17px; }

        /* --- 商品詳情彈窗 (Modal) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 900px; max-height: 90vh;
            border-radius: 12px; overflow-y: auto; position: relative; padding: 30px;
            display: flex; flex-wrap: wrap; gap: 30px;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }

        /* 詳情頁左側圖 */
        .modal-left { flex: 1 1 350px; }
        .modal-left img { width: 100%; border-radius: 8px; border: 1px solid #eee; }

        /* 詳情頁右側資訊 */
        .modal-right { flex: 1.5 1 400px; }
        .m-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .m-subtitle { color: #d63384; font-size: 14px; margin-bottom: 15px; font-style: italic; }
        
        /* 折扣表格 */
        .m-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .m-table th, .m-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .m-table th { background: #fafafa; color: #666; }

        /* 提示框 */
        .m-info-box { 
            background: var(--info-blue); border: 1px solid var(--info-border); 
            padding: 12px; border-radius: 4px; font-size: 14px; margin-bottom: 20px;
        }

        /* 選項按鈕組 */
        .m-option-title { font-size: 14px; color: #888; margin-bottom: 8px; }
        .m-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .opt-btn { 
            padding: 6px 15px; border: 1px solid #ddd; background: white; 
            border-radius: 4px; cursor: pointer; font-size: 14px; 
        }
        .opt-btn.active { border-color: var(--main-purple); color: var(--main-purple); background: #f9f0ff; }

        .m-buy-row { display: flex; align-items: center; gap: 20px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .m-price-big { font-size: 28px; color: #ff4d4f; font-weight: 700; }
        .m-buy-btn { 
            background: var(--main-purple); color: white; border: none; 
            padding: 12px 40px; border-radius: 6px; font-size: 16px; cursor: pointer; 
        }

        footer { background: #f8f9fa; padding: 40px 10%; text-align: center; font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="#">🏠 所有商品</a>
    <a href="mailto:sakurashop.tw@gmail.com">✉️ 聯絡我們</a>
    <a href="https://discord.gg/Yy4RpG4s4n" target="_blank">💬 官方 Discord</a>
</div>

<div class="header-main">
    <div class="logo">🌸 櫻花小舖</div>
</div>

<nav class="category-bar">
    <div class="nav-item">遊戲代購</div>
    <div class="nav-item">遊戲代儲</div>
    <div class="nav-item">禮物卡</div>
</nav>

<div class="container">
    <div class="product-grid" id="productGrid">
        </div>
</div>

<div class="modal-overlay" id="productModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="modal-left">
            <img id="m-img" src="" alt="商品圖">
        </div>

        <div class="modal-right">
            <div id="m-category" style="color: #999; font-size: 12px;">首頁 / 遊戲代購</div>
            <h1 class="m-title" id="m-title">Minecraft 代購</h1>
            <div class="m-subtitle" id="m-subtitle">Minecraft: Java版可在 Windows、Mac 和 Linux 上執行</div>

            <table class="m-table">
                <thead><tr><th>折扣說明</th></tr></thead>
                <tbody>
                    <tr><td>任選兩件享 95 折優惠</td></tr>
                    <tr><td>任選三件享 9 折優惠</td></tr>
                </tbody>
            </table>

            <div class="m-info-box">
                支援付款方式：<strong>超商 / 街口 / 轉帳</strong><br>
                方案內有「ⓘ」符號，點擊後將詳細介紹。
            </div>

            <div class="m-option-title">版本</div>
            <div class="m-options">
                <button class="opt-btn active">電腦版 (支援 Java+基岩 雙版本)</button>
                <button class="opt-btn">手機版</button>
            </div>

            <div class="m-option-title">方案</div>
            <div class="m-options" id="m-plans">
                <button class="opt-btn active">全新帳號</button>
                <button class="opt-btn">登入代購</button>
                <button class="opt-btn">序號</button>
            </div>

            <div class="m-buy-row">
                <div class="m-price-big" id="m-price">NT$ 800</div>
                <button class="m-buy-btn" onclick="goToDiscord()">加入購物車</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 櫻花小舖 Sakura Shop | sakurashop.tw@gmail.com</p>
</footer>

<script>
    // 商品資料庫
    const products = [
        {
            id: 1,
            name: "Minecraft 官方正版帳號代購",
            price: "NT$ 800",
            subtitle: "Minecraft: Java & Bedrock Edition for PC",
            img: "https://files.catbox.moe/5k4f7c.jpg",
            plans: ["全新帳號", "登入代購", "序號", "豪華版序號"]
        },
        {
            id: 2,
            name: "Discord Nitro 贈禮連結",
            price: "NT$ 150",
            subtitle: "禮物連結免登入，安全快速",
            img: "https://files.catbox.moe/o6o2h1.jpg",
            plans: ["Classic 月費", "Nitro 月費", "Nitro 年費"]
        },
        {
            id: 3,
            name: "Steam 蒸氣卡儲值 (台幣)",
            price: "NT$ 500",
            subtitle: "即時發卡，支援各大區帳號",
            img: "https://files.catbox.moe/u0f5v7.jpg",
            plans: ["500點", "1000點", "2000點"]
        }
    ];

    // 渲染主頁商品
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="p-card" onclick="openModal(${p.id})">
                <div class="img-wrap">
                    <img src="${p.img}" alt="${p.name}">
                </div>
                <div class="p-info">
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">${p.price} 起</div>
                </div>
            </div>
        `).join('');
    }

    // 打開詳情彈窗
    function openModal(id) {
        const p = products.find(item => item.id === id);
        document.getElementById('m-title').innerText = p.name;
        document.getElementById('m-subtitle').innerText = p.subtitle;
        document.getElementById('m-price').innerText = p.price;
        document.getElementById('m-img').src = p.img;
        
        // 渲染方案按鈕
        const planContainer = document.getElementById('m-plans');
        planContainer.innerHTML = p.plans.map((plan, index) => `
            <button class="opt-btn ${index === 0 ? 'active' : ''}">${plan}</button>
        `).join('');

        document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    function goToDiscord() {
        window.open("https://discord.gg/Yy4RpG4s4n", "_blank");
    }

    // 點擊背景關閉
    window.onclick = function(event) {
        if (event.target == document.getElementById('productModal')) {
            closeModal();
        }
    }

    renderProducts();
</script>

</body>
</html>
