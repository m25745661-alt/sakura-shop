<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Shop | 專業數位儲值商城</title>
    <style>
        :root { --primary: #ff7979; --dark: #2f3542; --light: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; color: #333; }
        
        /* 導覽列 */
        header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        
        /* 商品區塊 */
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .filter-buttons { text-align: center; margin-bottom: 20px; }
        .filter-buttons button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .price { color: #eb4d4b; font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        
        /* 懸浮按鈕 */
        .float-btn { position: fixed; bottom: 30px; right: 30px; background: #2f3542; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        
        /* 信任區塊 */
        .trust-box { background: #ffeaa7; padding: 15px; border-radius: 10px; margin-top: 30px; border: 2px dashed #fdcb6e; }
    </style>
</head>
<body>

<header>
    <h1>Sakura Shop 櫻花店</h1>
</header>

<div class="container">
    <div class="filter-buttons">
        <button onclick="filterCategory('all')">全部商品</button>
        <button onclick="filterCategory('game')">遊戲儲值</button>
        <button onclick="filterCategory('streaming')">影音訂閱</button>
    </div>

    <div class="product-grid" id="productGrid">
        <div class="card" data-category="game">
            <h3>熱門手遊點數</h3>
            <div class="price">NT$ 500</div>
            <a href="mailto:sakurashop.tw@gmail.com" class="btn">立即購買</a>
        </div>
        <div class="card" data-category="streaming">
            <h3>Netflix 會員</h3>
            <div class="price">NT$ 300</div>
            <a href="mailto:sakurashop.tw@gmail.com" class="btn">立即購買</a>
        </div>
    </div>

    <div class="trust-box">
        <p>💡 <strong>購買提示：</strong> 我們提供 24 小時快速發貨。結帳時請務必備註你的專屬識別碼：<strong style="color: #d63031;">Yy4RpG4s4n</strong>，系統將優先處理您的訂單。</p>
    </div>
</div>

<a href="mailto:sakurashop.tw@gmail.com" class="float-btn">✉️ 聯絡客服</a>

<script>
    function filterCategory(category) {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if (category === 'all' || card.dataset.category === category) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
